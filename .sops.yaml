# sops recipient policy for fountel.
#
# This file is the SINGLE source of truth for *who may decrypt* fountel's
# encrypted secret files. sops uses it whenever a matching `*.enc.*` file is
# encrypted or re-keyed; each rule lists the age recipients (public keys)
# allowed to decrypt files under that path.
#
# Recipient lifecycle
# -------------------
#   Grant decryption to an operator:
#     1. The operator generates an age key pair and shares only the PUBLIC key
#        (the `age1...` string). See docs/secrets.md, "Dev secret bootstrap".
#     2. Add that public key to the relevant rule's `age:` list below.
#     3. Re-key every affected file so the new recipient can read it:
#            sops updatekeys deploy/dev/secrets.enc.env
#            sops updatekeys deploy/dev/gnupg.secret.enc.asc
#
#   Revoke decryption:
#     1. Remove the operator's public key from the rule below.
#     2. `sops updatekeys ...` to drop it from the file metadata.
#     3. ROTATE the underlying secret values (a removed recipient may still
#        hold a copy of the old plaintext) — re-run ./bin/secrets-init.sh
#        with --rotate (see docs/secrets.md).
#
# The dev rule below carries the live dev recipient (the committed
# deploy/dev/secrets.enc.env and deploy/dev/gnupg.secret.enc.asc are encrypted
# to it). The prod placeholder MUST be replaced before prod is built;
# `./deploy/dev/bin/secrets-init.sh` substitutes a generated public key for a
# placeholder when bootstrapping an environment.

creation_rules:
  # ---- dev environment -----------------------------------------------------
  # `asc` covers the armored instance GnuPG private key (gnupg.secret.enc.asc).
  - path_regex: deploy/dev/.*\.enc\.(env|ya?ml|json|asc)$
    key_groups:
      - age:
          # Dev recipient. Grant another operator: add their age public key
          # here, then `sops updatekeys deploy/dev/secrets.enc.env`.
          - "age1h3q3cec0nkrh0fg54x4dqu4mga3ehf6kkjs83qczcwnd8hdta3ysnh0czx"

  # ---- prod environment (Phase 2; recipients added when prod is built) -----
  - path_regex: deploy/prod/.*\.enc\.(env|ya?ml|json|asc)$
    key_groups:
      - age:
          - "REPLACE_WITH_PROD_AGE_PUBLIC_KEY"
