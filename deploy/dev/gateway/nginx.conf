# fountel mTLS edge gateway (issue #4).
#
# This is the ONLY externally-reachable service in the dev stack, and it
# exposes ONLY the published feed-format snapshot over mTLS. MISP's web UI /
# REST API are NOT proxied here — they stay on misp-core's loopback-bound host
# publish (admin-only) and the internal compose network.
#
# mTLS policy (org bootroot): nginx terminates TLS, verifies the client cert
# chains to the bootroot CA bundle, then delegates per-peer authorization to
# the fountel-owned san-auth service (gateway/san-auth, issue #2) via
# auth_request. san-auth allows iff a DNS/URI SAN matches its allowlist.
#
# Certs are externally provisioned bootroot PEMs mounted read-only — fountel
# builds no issuance/rotation machinery, it only consumes provisioned PEMs.
# See gateway/README.md for the expected mount paths.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile      on;
    server_tokens off;

    # JSON-ish access log including the verified client SAN/DN, handy for
    # confirming who fetched the feed during dev verification.
    log_format mtls '$remote_addr "$ssl_client_s_dn" verify=$ssl_client_verify '
                    '"$request" $status ${body_bytes_sent}B';
    access_log /var/log/nginx/access.log mtls;

    # --- container liveness (NOT published to the host) --------------------
    # Plain-HTTP health endpoint on a private port for the compose
    # healthcheck. It carries no feed data and is never bound to the host.
    server {
        listen 8081;
        server_name _;

        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        location / {
            return 404;
        }
    }

    # --- the mTLS feed edge (the only externally-published listener) -------
    server {
        listen 8443 ssl;
        server_name _;

        # Gateway's own bootroot SERVER cert/key (externally provisioned).
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # Verify the CLIENT cert chains to the bootroot CA bundle. `on` (not
        # `optional`) means a client presenting no cert, or a cert that does
        # not chain to the bootroot, is rejected at the TLS handshake.
        ssl_client_certificate /etc/nginx/certs/bootroot-ca.pem;
        ssl_verify_client on;
        ssl_verify_depth   3;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_session_cache   shared:mtls:1m;
        ssl_session_timeout 10m;

        # Internal authorization subrequest to the #2 san-auth service.
        # Per san-auth's fixed contract, the client cert is forwarded ONLY as
        # the URL-encoded PEM in X-Client-Cert; no other field carries
        # identity. san-auth accepts GET/HEAD only, which the GET subrequest
        # satisfies. The request body is dropped — authz needs only the cert.
        location = /_authz {
            internal;
            proxy_pass              http://san-auth:8080/authz;
            proxy_pass_request_body off;
            proxy_set_header        Content-Length "";
            proxy_set_header        X-Client-Cert $ssl_client_escaped_cert;
        }

        # The ONLY externally-served path: the published feed snapshot.
        # `public` is an atomically-swapped symlink the export job repoints,
        # so nginx never serves a half-written snapshot. Static serving
        # supplies native Last-Modified / ETag freshness markers.
        location /feed/ {
            auth_request /_authz;

            alias /srv/feed/public/;
            autoindex off;
            add_header Cache-Control "no-cache" always;
        }

        # Everything else (MISP UI/API paths included) is closed.
        location / {
            return 404;
        }
    }
}
